name: Life Shortcut Auto Bot

on:
  schedule:
    # UTC 0시, 4시, 9시, 13시 가동
    # 한국(KST) 기준: [오전 9시], [오후 1시], [오후 6시], [밤 10시] 피크타임 정밀 타격
    - cron: '0 0,4,9,13 * * *'
  workflow_dispatch: # ★수동 트리거 버튼(Run workflow)을 화면에 생성하는 마법의 코드!

jobs:
  post:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required libraries
        run: |
          python -m pip install --upgrade pip
          pip install google-genai google-api-python-client google-auth-httplib2 google-auth-oauthlib Pillow requests

      - name: Run Auto Post Script
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TOKEN_PICKLE_BASE64: ${{ secrets.TOKEN_PICKLE_BASE64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python auto-post.py
